<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="icon" href="Images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <h1>Shopping Cart</h1>
            <ul>
                <li><a href="#" onclick="filterCategory('all')">All</a></li>
                <li><a href="#" onclick="filterCategory('mobiles')">Mobiles</a></li>
                <li><a href="#" onclick="filterCategory('laptops')">Laptops</a></li>
                <li><a href="#" onclick="filterCategory('accessories')">Accessories</a></li>
                <li class="cart-icon" onclick="toggleCart()">
                    🛒<sup id="cart-count">0</sup>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="products" id="product-list">
            <!-- 15+ Products will be dynamically inserted here -->
        </section>
    </main>

    <div class="cart-panel" id="cart-panel">
        <h2>Shopping Cart</h2>
        <button class="close-cart" onclick="toggleCart()">✖</button>
        <div id="cart-items"></div>
        <h3>Total: Rs. <span id="cart-total">0</span></h3>
        <button onclick="clearCart()" class="clear-cart">Empty Cart</button>
        <button onclick="checkout()" class="checkout-btn">Checkout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
